<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unhidden Demo Debug</title>
  <style>
    body{
      font-family: Inter, system-ui, sans-serif;
      background:#05070A;
      color:#E6EDF3;
      padding:40px;
      line-height:1.5;
    }
    .box{
      max-width:780px;
      border:1px solid rgba(230,237,243,.14);
      border-radius:24px;
      padding:24px;
      background:rgba(230,237,243,.04);
    }
    input{
      width:100%;
      max-width:520px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(230,237,243,.18);
      background:#0B1018;
      color:#fff;
      margin-top:16px;
    }
    button{
      padding:12px 16px;
      border:0;
      border-radius:999px;
      margin-left:8px;
      background:linear-gradient(135deg,#2F6BFF,#7A5CFF);
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    .msg{
      border:1px solid rgba(230,237,243,.12);
      border-radius:16px;
      padding:12px 14px;
      margin:10px 0;
      background:rgba(230,237,243,.035);
    }
    .muted{color:#8B949E;font-size:13px}
    code{color:#9DBBFF}
  </style>
</head>
<body>
  <div class="box">
    <h1>Unhidden Demo — API Test</h1>
    <p class="muted">This page tests whether Vercel can call <code>/api/chat</code>.</p>

    <p class="muted">Endpoint used: <code id="endpoint"></code></p>

    <div id="chat"></div>

    <input id="input" value="test" />
    <button id="send">Send</button>
    <button id="gettest">Test GET</button>
  </div>

<script>
  const endpoint = new URL("/api/chat", window.location.origin).href;
  document.getElementById("endpoint").textContent = endpoint;

  function addMsg(role, text){
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = "<strong>"+role+":</strong><br>" + String(text);
    document.getElementById("chat").appendChild(div);
  }

  async function testGet(){
    try{
      addMsg("System", "Calling GET " + endpoint);
      const res = await fetch(endpoint, { method: "GET" });
      const text = await res.text();
      addMsg("GET result", "Status " + res.status + "<br><pre style='white-space:pre-wrap'>" + text.replace(/[<>&]/g, s => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[s])) + "</pre>");
    }catch(err){
      addMsg("GET error", err.name + ": " + err.message);
    }
  }

  async function send(){
    const q = document.getElementById("input").value || "test";
    addMsg("You", q);

    try{
      const payload = JSON.stringify({ question: q });
      addMsg("System", "Calling POST " + endpoint);

      const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload
      });

      const text = await res.text();

      let data;
      try{
        data = JSON.parse(text);
      }catch(e){
        addMsg("AI", "Status " + res.status + "<br>Non-JSON response:<br><pre style='white-space:pre-wrap'>" + text.replace(/[<>&]/g, s => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[s])) + "</pre>");
        return;
      }

      addMsg("AI", "Status " + res.status + "<br>" + (data.answer || JSON.stringify(data)));
    }catch(err){
      addMsg("Network error", err.name + ": " + err.message + "<br>Endpoint: " + endpoint);
    }
  }

  document.getElementById("send").addEventListener("click", send);
  document.getElementById("gettest").addEventListener("click", testGet);
</script>
</body>
</html>
