<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Unhidden Demo</title>
  <style>
    body{
      font-family: Inter, system-ui, sans-serif;
      background:#05070A;
      color:#E6EDF3;
      padding:40px;
    }
    .box{
      max-width:700px;
      margin:auto;
    }
    input{
      width:70%;
      padding:12px;
      border-radius:10px;
      border:1px solid #333;
      background:#0B1018;
      color:white;
    }
    button{
      padding:12px 16px;
      border-radius:10px;
      border:none;
      background:#2F6BFF;
      color:white;
      margin-left:10px;
      cursor:pointer;
    }
    .msg{
      margin:12px 0;
      padding:12px;
      border-radius:12px;
      background:#0B1018;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Unhidden</h2>
    <div id="chat"></div>

    <input id="input" placeholder="Describe your financial situation..." />
    <button onclick="send()">Send</button>
  </div>

<script>
function addMsg(role, text){
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = "<b>"+role+":</b><br>"+text;
  document.getElementById("chat").appendChild(div);
}

async function answer(q){
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({question:q})
    });

    const data = await res.json();

    if (!res.ok) {
      addMsg("AI","Error: "+JSON.stringify(data));
      return;
    }

    addMsg("AI", data.answer || "No response");

  } catch(err){
    addMsg("AI","Connection error: "+err.message);
  }
}

function send(){
  const q = document.getElementById("input").value;
  addMsg("You", q);
  answer(q);
}
</script>
</body>
</html>
