<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Unhidden — Demo</title>
<style>
body{background:#05070A;color:#E6EDF3;font-family:Inter;padding:40px}
.container{max-width:900px;margin:auto}
.card{background:#0B1018;padding:20px;border-radius:16px;margin-bottom:20px}
textarea{width:100%;height:120px;background:#0B1018;color:white;border:1px solid #333;padding:12px;border-radius:10px}
button{background:#2F6BFF;color:white;padding:12px 20px;border:none;border-radius:10px;margin-top:10px;cursor:pointer}
.output{margin-top:20px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="container">

<h1>Unhidden</h1>
<p>Financial blind spot detection</p>

<div class="card">
<textarea id="input" placeholder="Describe your financial situation..."></textarea>
<button onclick="run()">Analyze</button>
</div>

<div class="card output" id="output"></div>

</div>

<script>
async function run(){
  const q = document.getElementById("input").value;
  document.getElementById("output").innerText = "Analyzing...";

  try{
    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({question:q})
    });

    const data = await res.json();
    document.getElementById("output").innerText = data.answer || "No response";

  }catch(e){
    document.getElementById("output").innerText = "Error: "+e.message;
  }
}
</script>

</body>
</html>
