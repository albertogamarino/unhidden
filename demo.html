<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Unhidden Demo</title>
</head>
<body style="font-family:sans-serif;background:#111;color:#fff;padding:40px;">
  <h2>Unhidden Demo (Debug Mode)</h2>

  <div id="chat"></div>

  <input id="input" placeholder="Ask something..." style="width:300px;">
  <button onclick="send()">Send</button>

  <script>
    function addMsg(role, text){
      const div = document.createElement("div");
      div.innerHTML = "<b>"+role+":</b> "+text;
      document.getElementById("chat").appendChild(div);
    }

    async function answer(q){
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({question:q})
        });

        const data = await res.json();

        if (!res.ok) {
          addMsg("AI","API error: "+JSON.stringify(data));
          return;
        }

        addMsg("AI", data.answer || "No response");

      } catch(err){
        addMsg("AI","Network error: "+err.message);
      }
    }

    function send(){
      const q = document.getElementById("input").value;
      addMsg("You", q);
      answer(q);
    }
  </script>
</body>
</html>
